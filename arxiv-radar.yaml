output_dir: arxiv-radar-output
storage_root: /storage/emulated/0/Books
lookback_days: 7
recent_limit: 8
cited_limit: 8
citation_candidate_limit: 24
sources:
  arxiv:
    enabled: true
    strict: true
  huggingface_papers:
    enabled: false
    target_path: AI/Hugging Face Papers
    min_upvotes:
  semantic_scholar:
    enabled: false
    api_key_env: SEMANTIC_SCHOLAR_API_KEY
    categories:
      AI:
        query: "(machine learning OR language models OR agents)"
        target_path: AI/Semantic Scholar
        limit: 50
  paperswithcode:
    enabled: false
    categories:
      AI:
        query: "large language model"
        target_path: AI/Papers with Code
        limit: 50
  manual_links:
    enabled: false
    input_path: artifacts/manual-paper-links.txt
    target_path: AI/Manual imports
export:
  section: all
  categories:
    - AI
    - Data
  exclude_categories: []
  top:
  min_citations: 10
  max_citations:
  since:
  lookback_days: 28
report:
  model: openai/gpt-5.5
  variant:
  title: AI and Data Research Radar Summary
  max_papers:
  summary_cache_dir: artifacts/summary-cache
  markdown_cache_dir: artifacts/markdown-cache
  output_tex: artifacts/arxiv-radar-summary.tex
  output_pdf: artifacts/arxiv-radar-summary.pdf
  build_dir: artifacts/report-build
  prompt_version: 3
periodical:
  series: Research Radar
  issue:
  focus:
  supporting_papers: 6
reference_depth: 0
max_references_per_paper: 10
min_reference_citations: 50
categories:
  AI:
    query: cat:cs.AI OR cat:cs.LG OR cat:cs.CL
    target_path: AI/Research radar
  Data:
    query: cat:cs.DB OR cat:cs.IR OR cat:cs.DC OR cat:stat.AP
    target_path: Data/Research radar
